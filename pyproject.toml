[tool.black]
line-length = 88
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 88

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # ошибки стиля
    "F",   # ошибки Python
    "B",   # bugbear (потенциальные баги)
    "I",   # импорты
]


ignore = [
    "E501"  # длинные строки (black сам исправит)
]